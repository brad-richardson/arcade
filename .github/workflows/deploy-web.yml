name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Verify export templates
        run: ls /root/.local/share/godot/export_templates/

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export web build
        run: |
          mkdir -p export/web
          godot --headless --export-release "Web" export/web/index.html

      - name: Add coi-serviceworker for SharedArrayBuffer
        run: |
          cat > export/web/coi-serviceworker.js << 'SWEOF'
          /*! coi-serviceworker v0.1.7 - Guido Zuidhof, licensed under MIT */
          if(typeof window==='undefined'){self.addEventListener("install",()=>self.skipWaiting()),self.addEventListener("activate",(e)=>e.waitUntil(self.clients.claim())),self.addEventListener("fetch",(e)=>{if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;e.respondWith(fetch(e.request).then((r)=>{if(r.status===0)return r;const h=new Headers(r.headers);h.set("Cross-Origin-Embedder-Policy","require-corp");h.set("Cross-Origin-Opener-Policy","same-origin");return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h})}).catch((e)=>console.error(e)))})}else{const r=window.navigator;if(!("serviceWorker"in r))return;r.serviceWorker.register(new URL("coi-serviceworker.js",window.location.href).href).then((r)=>{r.addEventListener("updatefound",()=>{const n=r.installing;n.addEventListener("statechange",()=>{if(n.state==="activated"&&!r.active.scriptURL.includes("coi-serviceworker"))window.location.reload()})})});let reloading=false;r.serviceWorker.addEventListener("controllerchange",()=>{if(!reloading){reloading=true;window.location.reload()}})}
          SWEOF

      - name: Inject service worker into HTML
        run: |
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' export/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: export/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
