name: PR Preview

# Note: uses pull_request, so previews only work for same-repo branches
# (fork PRs get a read-only token). This is fine for this project.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/* /github/home/.local/share/godot/export_templates/

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export web build
        run: |
          mkdir -p export/web
          godot --headless --export-release "Web" export/web/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-web-build
          path: export/web

  deploy-preview:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        if: github.event.action != 'closed'
        uses: actions/download-artifact@v4
        with:
          name: pr-web-build
          path: export/web

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: export/web/
          umbrella-dir: pr-preview
          action: auto
